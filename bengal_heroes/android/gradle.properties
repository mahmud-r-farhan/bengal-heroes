org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Enable Gradle caching for faster builds
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configureondemand=true

# Enable R8 full mode for better optimization
android.enableR8.fullMode=true

# Production build optimizations for Google Play Store
android.bundle.enableUncompressNativeLibraries=false
android.enableNewResourceShrinker=true
android.minSdkVersion=21
android.targetSdkVersion=34

# Suppress warnings during release builds
org.gradle.warning.mode=none
