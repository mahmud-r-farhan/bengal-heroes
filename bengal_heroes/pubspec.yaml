name: bengal_heroes
description: "Bengal Heroes - A tribute to the legends, freedom fighters, and intellectuals of Bengal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^17.0.1
  
  # Localization
  easy_localization: ^3.0.7
  intl: ^0.20.2
  
  # UI/UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  
  # Search
  fuzzy: ^0.5.1
  
  # Storage
  shared_preferences: ^2.5.3
  
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/data/
    - assets/translations/
    - assets/icons/
  
  # fonts:
  #   - family: Hind Siliguri
